<!DOCTYPE html>
<html>
    <head>
        <title>
            Learning about Fetch
        </title>
    </head>

    <body>
        <h1>
            Learning about Fetch
        </h1>

        <ul id="catFacts">

        </ul>

        <script>
            // JSON

            var simpleObject = {
                'name':'Ana',
                'role':'Student'
            }

            console.log(simpleObject);

            var catFacts = [
                "Ana is not a fan of cats",
                "Ana is allergic to cats",
            ];

            function renderList(){
                const ulElement = document.getElementById('catFacts');
                catFacts.forEach(fact => {
                    const li = document.createElement('li');
                    li.textContent = fact;
                    ulElement.appendChild(li);
                });
            }

            function getCatFacts(count){
                fetch('https://meowfacts.herokuapp.com')
                .then(response => response.json())
                .then(function (data) {
                    catFacts = data.data;
                    renderList();

                }
                );
            }

            //renderList();

            getCatFacts(1);

            function getDogBreeds(){
                // Get first 10 breeds
                fetch('https://dogapi.dog/api/v2/breeds?page[size]=10')
                    .then(response => response.json())
                    .then(function(data){
                        var dogBreeds = data.data; // this is an array of dog breed objects

                        console.log(dogBreeds[0].attributes.name);
                        console.log(dogBreeds[0].attributes.description);
                        console.log(dogBreeds[0].attributes.female_weight.max);
                    });
            }

            getDogBreeds();


        </script>
    </body>
</html>
