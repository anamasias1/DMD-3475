<!DOCTYPE html>
<html>
    <head>
        <title>Building our Task List</title>
    </head>
    <body>
        <h1>We're building a Task List</h1>
        <input type="text" id="newTask" placeholder="New task" />
        <button id="addTask">Add Task</button>

        <h2>Task List</h2>
        <ul id="taskList">
            <li>Sample Task 1</li>
            <li>Sample Task 2</li>
        </ul>

        <script>
            // when this button is clicked. . .
            var taskButton = document.querySelector("#addTask");
            // take the info from this input. . .
            var taskInput = document.querySelector("#newTask");

            // and put in an LI in here. . .
            var taskList = document.querySelector("#taskList");

            taskButton.addEventListener("click", function (){
                addTask(taskInput.value)
            })
               
            function addTask(newTask) {
                console.log("We're in our function!");
                var html = "<li>" + newTask + "</li>";
                taskList.innerHTML += html;
            }

            var shoppingList = ['Apples', 'String Cheese', 'Jerky'];

            console.log(shoppingList);

            console.log(shoppingList(0));

            shoppingList[shoppingList.length-1] = "Clementimes";

            console.log(shoppingList(2));

            shoppingList.push("Whiteboard Markers");
            shoppingList.push("A new TV");

            for (let i=0; i<shoppingList.length; i++) {
                console.log(shoppingList(i));
            }

        </script>
    </body>
    </html>
</html>
