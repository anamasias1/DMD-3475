              //myConsole.innerHTML += "<p>hello world</p>";

            log("hello world");

            log(add(12, 40));

            function calcLetterGrade(numberGrade){
                var letterGrade = "A";

                if(numberGrade < 93 && numberGrade >= 90) {
                    letterGrade = "A-";
                } else if (numberGrade < 90 && numberGrade >= 87) {
                    letterGrade = "B+";
                } else if (numberGrade < 87 && numberGrade >= 83) {
                    letterGrade = "B";
                } else if (numberGrade < 83 && numberGrade >= 80) {
                    letterGrade = "B-";
                } else if (numberGrade < 80 && numberGrade >= 77) {
                    letterGrade = "C+";
                } else if (numberGrade < 77 && numberGrade >= 74) {
                    letterGrade = "C";
                } else if (numberGrade < 74 && numberGrade >= 70) {
                    letterGrade = "C-";
                } else if (numberGrade < 70 && numberGrade >= 67) {
                    letterGrade = "D+";
                } else if (numberGrade < 67) {
                    letterGrade = "F";
                }

                return letterGrade;
            }

            var graduation = document.querySelector("#calGrade");

            gradeButton.addEventListener("click", function(){
                var numberGrade = parseInt(document.querySelector("#numberGrade").value)

                var myLetterGrade = calcLetterGrade(numberGrade);

                var message = "Your letter grade is " + myLetterGrade;

                log(message);
            });


    </script>
