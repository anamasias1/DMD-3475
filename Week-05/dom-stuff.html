<!DOCTYPE html>
<html>
    <head>
        <title>DOM Stuff</title>
        <style>
            .redBG {
                background-color: red;
                color: brown!important;
            }

            .happy {
                background-color: #FAFc97;
            }

            .happy h1 {
                text-transform: lowercase;
                color: palevioletred;
            }

            .happy h2 {
                text-transform: lowercase;
                color: pink;
            }

            .happy button {
                border-radius: 10px;
                background-color: palevioletred;
                color:blue;
                text-transform: lowercase;
            }

            .sad {
                background-color: blue;
                text-transform: lowercase!important;
            }

            .sad h1 {
                font-size 14px;
                color: #333;
            }

            .sad h2 {
                font-size: 8px;
                color: #333;
            }

            .sad button {
                background-color: transparent;
                border: 2px solid;
            }

        </style>
    </head>
    <body>
        
        <h1 id="pageH1">DOM StuffStuff</h1>
        <button id="makeRed">Click Me</button>

        <input type="text" id="newH1" placeholder="enter a new hi">
        <button id="changeH1">Change the H1</button>

        <h2>How are you today?</h2>
        <label for="userMood">
            Enter your mood.
        </label>

        <input type="text" id="userMood" placeholder="happy, sad, angry">

        <button id="processMood">Process Mood</button>

        <script>
            var button = document.querySelector("#makeRed")
            console.log(typeof button);

            button.addEventListener("click", function() {
                var body = document.querySelector("body");
                    body.classList.toggle("redBG");
                button.innerHTML = "change it back";
            });

            var newH1Input = document.querySelector("newH1");
            var newH1Button = document.querySelector("changeH1");
            var pageH1 = document.querySelector("#pageH1");

            newH1Button.addEventListener("click", function(){
                var inputValue = newH1Input.value;

                pageH1.innerHTML = inputValue;
            })

            var processMoodButton = document.querySelector("#processMood");
            var moodInput = document.querySelector("#userMood");
            var body = document.querySelector("body");

            processMoodButton.addEventListener("click", function() {

                if (inputValue == "happy") {
                    body.classList.add("happy");

                    body.classList.remove("angry");
                    body.classList.remove("sad");
                } else if (inputValue == "sad") {
                    body.classList.add("sad");

                    body.classList.remove("happy");

        </script>
    </body>
</html>
